<!DOCTYPE html>
<html>
<head>
    <title>Chat HR</title>
</head>
<body>

<h2>Pesan Masuk HR</h2>

{% for chat in chats %}

<div class="card">

    <h3>{{ chat.nama }}</h3>

    <p>{{ chat.message }}</p>

    <form method="POST"
          action="/admin/reply/{{chat.id}}">

        <textarea
        name="reply"></textarea>

        <button>
            Balas
        </button>

    </form>

</div>

{% endfor %}

</body>
</html>
