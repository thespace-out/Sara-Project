<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SARA Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e85d6d 0%, #c85666 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 56px;
            margin-bottom: 16px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            color: #888;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8f0;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e85d6d;
            box-shadow: 0 0 0 4px rgba(232, 93, 109, 0.1);
        }

        .form-group input::placeholder {
            color: #ccc;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e85d6d 0%, #c85666 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(232, 93, 109, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .error.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
            font-size: 13px;
            color: #1e40af;
        }

        .info-box strong {
            display: block;
            margin-bottom: 8px;
            color: #1e40af;
            font-weight: 600;
        }

        .info-box .cred {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin: 6px 0;
            font-family: 'Courier New', monospace;
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
        }

        .loading {
            display: none;
        }

        .loading.show::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <div class="logo">🤖</div>
                <h1>SARA Admin</h1>
                <p>PT Samaratu Daya Teknik</p>
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="error show">{{ error }}</div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username"
                        name="username" 
                        placeholder="Masukkan username" 
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        placeholder="Masukkan password" 
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn-submit">
                    <span id="btnText">Masuk ke Admin Panel</span>
                    <span class="loading" id="loading"></span>
                </button>
            </form>

            <!-- Default Credentials Info -->
            <div class="info-box">
                <strong>📝 Kredensial Default Admin</strong>
                <div class="cred">👤 Username: <strong>admin</strong></div>
                <div class="cred">🔑 Password: <strong>admin123</strong></div>
                <p style="margin-top: 10px; color: #0c4a6e;">
                    💡 <strong>Tip:</strong> Ubah password default setelah login pertama kali untuk keamanan yang lebih baik.
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btnText = document.getElementById('btnText');
            const loading = document.getElementById('loading');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert('Username dan password tidak boleh kosong!');
                return;
            }

            // Show loading state
            btnText.style.opacity = '0.7';
            loading.classList.add('show');
        });

        // Clear error message when user starts typing
        document.getElementById('username').addEventListener('input', function() {
            const error = document.querySelector('.error');
            if(error) error.classList.remove('show');
        });

        document.getElementById('password').addEventListener('input', function() {
            const error = document.querySelector('.error');
            if(error) error.classList.remove('show');
        });
    </script>
</body>
</html>
